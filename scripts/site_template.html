<!-- Rights Left - weekly civil-liberties tracker -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rights Left — The Rights That Have Left of Us Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<style>
  :root{
    --ink:#0A0A0B; --panel:#121216; --panel2:#17171c;
    --paper:#F6F6F4; --paper-dim:#B6B7BD; --paper-faint:#77787F;
    --line:rgba(246,246,244,.13); --line-strong:rgba(246,246,244,.28);
    --blue:#3B6FF6; --blue-bright:#7CA6FF; --blue-deep:#1E3A8A;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--ink);color:var(--paper-dim);
    font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:16px;line-height:1.55;
    -webkit-font-smoothing:antialiased;}
  a{color:var(--blue-bright);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}
  .mono{font-family:"IBM Plex Mono",monospace}
  .eyebrow{font-family:"IBM Plex Mono",monospace;text-transform:uppercase;
    letter-spacing:.18em;font-size:11px;color:var(--blue-bright)}

  /* top bar */
  .top{position:sticky;top:0;z-index:50;background:rgba(10,10,11,.82);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .top .wrap{display:flex;align-items:center;gap:18px;height:64px}
  .mark{font-family:"Archivo",sans-serif;font-weight:800;text-transform:uppercase;
    letter-spacing:.02em;font-size:22px;color:var(--paper);display:flex;align-items:center;gap:8px;white-space:nowrap}
  .mark .stamp{background:var(--blue);color:var(--ink);padding:1px 8px;border-radius:2px}
  .mark .cursor{width:10px;height:19px;background:var(--paper);display:inline-block;
    transform:translateY(2px);animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .top-tag{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--paper-faint);
    text-transform:uppercase;letter-spacing:.14em;border-left:1px solid var(--line);padding-left:16px}
  .controls{margin-left:auto;display:flex;gap:10px;align-items:center}
  select,input[type=search]{background:var(--panel);color:var(--paper);border:1px solid var(--line-strong);
    border-radius:3px;padding:8px 10px;font-family:"IBM Plex Mono",monospace;font-size:12px}
  input[type=search]{width:150px}
  select:focus,input:focus{outline:2px solid var(--blue);outline-offset:1px;border-color:var(--blue)}
  @media(max-width:720px){.top-tag{display:none}.controls{gap:6px}input[type=search]{width:110px}}

  /* hero */
  .hero{border-bottom:1px solid var(--line);padding:64px 0 48px}
  .hero .eyebrow{margin-bottom:18px}
  .htitle{font-family:"Archivo",sans-serif;font-weight:800;color:var(--paper);
    text-transform:uppercase;line-height:.92;letter-spacing:-.01em;
    font-size:clamp(2.6rem,7.5vw,6rem);margin:0 0 8px;position:relative;display:block}
  .htitle .rights{color:#E53935}
  .htitle .left{color:var(--blue);position:relative}
  .htitle .left::after{content:"";position:absolute;top:0;left:0;right:0;bottom:0;
    background:var(--blue);transform-origin:left;
    animation:declass .75s cubic-bezier(.7,0,.2,1) .25s both}
  @keyframes declass{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}
  .hsub{font-size:clamp(1.05rem,2.2vw,1.35rem);color:var(--paper);max-width:760px;margin:20px 0 0;
    font-weight:500;line-height:1.4}
  .hstand{color:var(--paper-dim);max-width:720px;margin:14px 0 0}
  .hmeta{display:flex;flex-wrap:wrap;gap:26px;margin-top:30px}
  .stat{display:flex;flex-direction:column;gap:2px}
  .stat b{font-family:"Archivo",sans-serif;font-weight:800;color:var(--paper);font-size:34px;line-height:1}
  .stat span{font-family:"IBM Plex Mono",monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:.14em;color:var(--paper-faint)}
  .infile{margin-top:34px;border-top:1px solid var(--line);padding-top:22px}
  .infile h4{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--blue-bright);margin:0 0 12px}
  .infile ul{list-style:none;margin:0;padding:0;display:grid;gap:9px}
  .infile li{display:flex;gap:12px;align-items:baseline}
  .infile .fn{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--blue);flex:none}
  .infile button{all:unset;cursor:pointer;color:var(--paper);line-height:1.35}
  .infile button:hover{color:var(--blue-bright)}

  /* record layout */
  .record{padding:52px 0 20px}
  .rhead{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--paper-faint);margin:0 0 20px;
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .grid{display:grid;grid-template-columns:280px 1fr;gap:40px;align-items:start}
  @media(max-width:900px){.grid{grid-template-columns:1fr;gap:26px}}

  /* archive */
  .archive{position:sticky;top:84px;max-height:calc(100vh - 108px);overflow:auto;
    border:1px solid var(--line);border-radius:4px;background:var(--panel)}
  @media(max-width:900px){.archive{position:static;max-height:340px}}
  .archive-h{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--paper-faint);padding:14px 16px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--panel)}
  .wk{all:unset;display:flex;align-items:center;gap:12px;width:100%;box-sizing:border-box;
    padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--line);position:relative}
  .wk:hover{background:var(--panel2)}
  .wk.active{background:var(--panel2)}
  .wk.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue)}
  .wk.dim{opacity:.4}
  .wk .d{font-family:"IBM Plex Mono",monospace;font-size:12.5px;color:var(--paper);flex:1;letter-spacing:.01em}
  .wk.active .d{color:var(--paper)}
  .wk .c{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--blue-bright);
    background:rgba(59,111,246,.14);border:1px solid rgba(59,111,246,.3);border-radius:10px;
    padding:1px 8px;flex:none}

  /* reader */
  .wtitle{font-family:"Archivo",sans-serif;font-weight:800;color:var(--paper);
    text-transform:uppercase;font-size:clamp(1.6rem,4vw,2.4rem);line-height:1;margin:0 0 4px;letter-spacing:-.01em}
  .wtitle small{display:block;font-family:"IBM Plex Mono",monospace;font-weight:500;
    font-size:12px;letter-spacing:.14em;color:var(--paper-faint);margin-top:10px;text-transform:uppercase}
  .cards{display:grid;gap:20px;margin-top:26px}
  .card{border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:4px;
    background:var(--panel);overflow:hidden}
  .plate{display:flex;align-items:center;gap:12px;background:var(--panel2);
    border-bottom:1px dashed var(--line-strong);padding:11px 18px}
  .plate .glyph{width:26px;height:26px;color:var(--blue-bright);flex:none}
  .plate .glyph svg{width:100%;height:100%}
  .plate .pcat{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--paper)}
  .plate .pmeta{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:11px;
    letter-spacing:.1em;color:var(--paper-faint);text-transform:uppercase;text-align:right}
  .card img{width:100%;display:block;max-height:280px;object-fit:cover;border-bottom:1px solid var(--line)}
  .cbody{padding:18px 20px 20px}
  .headline{font-family:"Archivo",sans-serif;font-weight:700;color:var(--paper);
    font-size:1.28rem;line-height:1.25;margin:0 0 12px}
  .summary{color:var(--paper-dim);line-height:1.62;margin:0}
  .source{margin-top:16px;padding-top:13px;border-top:1px solid var(--line);
    font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--paper-faint);
    display:flex;flex-wrap:wrap;gap:6px 10px;align-items:baseline}
  .source .lbl{color:var(--blue-bright);letter-spacing:.08em}
  .source .out{color:var(--paper)}
  .nolink{color:var(--paper-faint);font-style:italic}
  .empty{border:1px dashed var(--line-strong);border-radius:4px;padding:40px;text-align:center;
    color:var(--paper-faint);font-family:"IBM Plex Mono",monospace;font-size:13px}

  /* footer */
  footer{border-top:1px solid var(--line);margin-top:60px;padding:40px 0 70px}
  .disc{background:var(--panel);border:1px solid var(--line);border-radius:4px;
    padding:20px 22px;font-size:13.5px;color:var(--paper-dim);line-height:1.6;max-width:820px}
  .disc b{color:var(--paper);font-weight:600}
  .fmeta{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--paper-faint);margin-top:24px;display:flex;flex-wrap:wrap;gap:6px 20px}

  /* nav links + support button */
  .mark{cursor:pointer}
  .nav-links{display:flex;gap:2px}
  .nav-links button{background:none;border:none;cursor:pointer;font-family:"IBM Plex Mono",monospace;
    font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--paper-faint);
    padding:6px 11px;border-radius:3px}
  .nav-links button:hover{color:var(--paper)}
  .nav-links button.active{color:var(--paper);background:var(--panel2)}
  .support-btn{background:var(--blue);color:#fff;border:none;border-radius:4px;padding:8px 15px;
    font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:12px;text-transform:uppercase;
    letter-spacing:.08em;cursor:pointer}
  .support-btn:hover{filter:brightness(1.12)}

  /* about page */
  .about-hero{position:relative;min-height:max(34vh,300px);display:flex;align-items:flex-end;
    background-size:cover;background-position:center;background-color:var(--panel2);
    border-bottom:1px solid var(--line)}
  .about-hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,
    rgba(10,10,11,.42) 0%,rgba(10,10,11,.55) 55%,rgba(10,10,11,.93) 100%)}
  .about-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .about-placeholder span{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--paper-faint);border:1px dashed var(--line-strong);
    border-radius:4px;padding:11px 18px;background:rgba(10,10,11,.4)}
  .about-hero-inner{position:relative;padding:0 22px 40px;width:100%;max-width:1180px;margin:0 auto}
  .about-title{font-family:"Archivo",sans-serif;font-weight:800;text-transform:uppercase;
    color:var(--paper);line-height:.94;font-size:clamp(2rem,5.5vw,4rem);margin:12px 0 0;letter-spacing:-.01em}
  .about-body{padding:46px 22px 20px;max-width:820px;margin:0 auto}
  .about-body .lead{font-size:1.18rem;color:var(--paper);line-height:1.5;margin:0 0 28px;font-weight:500}
  .about-body h2{font-family:"Archivo",sans-serif;font-weight:800;text-transform:uppercase;
    color:var(--paper);font-size:1.5rem;letter-spacing:-.01em;margin:34px 0 12px}
  .about-body p{color:var(--paper-dim);line-height:1.72;margin:0 0 16px}
  .about-note{margin-top:30px;border-top:1px solid var(--line);padding-top:20px;
    font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--paper-faint);letter-spacing:.04em}

  /* donate modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.74);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;z-index:100;padding:22px}
  .modal{position:relative;background:var(--panel);border:1px solid var(--line-strong);border-radius:6px;
    max-width:440px;width:100%;padding:32px 28px 26px}
  .modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--paper-faint);
    font-size:26px;line-height:1;cursor:pointer;padding:4px}
  .modal-close:hover{color:var(--paper)}
  .modal h3{font-family:"Archivo",sans-serif;font-weight:800;text-transform:uppercase;color:var(--paper);
    font-size:1.4rem;margin:6px 0 12px;letter-spacing:-.01em}
  .modal p{color:var(--paper-dim);line-height:1.6;margin:0 0 14px;font-size:.95rem}
  .pay-options{display:grid;gap:12px;margin:22px 0 6px}
  .pay-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 18px;
    border-radius:5px;font-family:"IBM Plex Sans",sans-serif;font-weight:600;font-size:1rem;
    text-decoration:none;color:#fff}
  .pay-btn:hover{text-decoration:none;filter:brightness(1.09)}
  .pay-btn.paypal{background:#0070BA}
  .pay-btn.venmo{background:#008CFF}
  .pay-note{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--paper-faint);
    text-align:center;border:1px dashed var(--line-strong);border-radius:4px;padding:16px}
  .pay-fine{font-size:11.5px;color:var(--paper-faint);margin:16px 0 0;line-height:1.5}

  @media(max-width:760px){
    .top .wrap{flex-wrap:wrap;height:auto;padding-top:10px;padding-bottom:10px;gap:8px 12px}
    .nav-links{order:3}
  }
  @media(prefers-reduced-motion:reduce){
    .htitle .rl::after{animation:none;transform:scaleX(0)}
    .mark .cursor{animation:none}
    *{scroll-behavior:auto!important}
  }
</style>
<div id="root"></div>
<script type="text/babel">
const DATA = __DATA__;
const CATS = __CATS__;
const SITE = __SITE__;

/* =========================================================================
   EDIT THESE THREE LINES to add your own image and donation links.
   Leave a value as ""  to hide that feature. Put your links between the quotes.
   ========================================================================= */
const ABOUT_IMAGE = "https://i.imgur.com/ijS1D3P.png";   // hosted image for the top of the About page, e.g. "https://i.imgur.com/abc123.jpg"
const PAYPAL_URL  = "https://www.paypal.com/donate/?hosted_button_id=5KDHNKC6WELKY";   // your PayPal.me link, e.g. "https://paypal.me/YourName"
const VENMO_URL   = "https://venmo.com/u/Chris-2600";   // your Venmo profile link, e.g. "https://venmo.com/u/YourUsername"
/* ========================================================================= */

const GLYPH_MAP = {
  "Democracy & Rule of Law":"scales","Executive Power":"building",
  "Immigration":"people","Immigration / Free Speech":"megaphone",
  "Economy & Tariffs":"chart","Courts & SCOTUS":"gavel",
  "Civil Rights & Minorities":"people","LGBTQ+ Rights":"heart",
  "Women's Rights / LGBTQ+":"heart","Press Freedom":"megaphone",
  "Public Health":"cross","Healthcare":"cross","Environment & Science":"leaf",
  "Education":"book","Foreign Policy & Aid":"globe","Federal Workforce":"briefcase",
  "Civil Liberties":"shield"
};
const PATHS = {
  scales:"M12 3v18 M5 8h14 M5 8l-2 5h4z M19 8l-2 5h4z M8 21h8",
  building:"M3 21h18 M5 21V9l7-4 7 4v12 M9 21v-6h6v6",
  people:"M8.5 8.5a2.4 2.4 0 100-4.8 2.4 2.4 0 000 4.8 M4 20v-1.6A3.4 3.4 0 017.4 15h2.2 M15.5 8.5a2.4 2.4 0 100-4.8 2.4 2.4 0 000 4.8 M20 20v-1.6a3.4 3.4 0 00-3.4-3.4h-2.2",
  chart:"M4 20V4 M4 20h16 M8 16l3-4 3 2 4-6",
  gavel:"M4 9l8-5 8 5 M5 9v9 M12 9v9 M19 9v9 M3 20h18",
  megaphone:"M3 11v2l11 5V6L3 11z M14 8a4 4 0 010 8",
  cross:"M12 4v16 M4 12h16",
  leaf:"M5 19c8 2 14-4 14-14C10 5 4 11 5 19z M5 19l7-7",
  book:"M4 5a2 2 0 012-2h12v16H6a2 2 0 00-2 2V5z M18 3v16",
  globe:"M12 3a9 9 0 100 18 9 9 0 000-18z M3 12h18 M12 3c3 3.2 3 14.8 0 18 M12 3c-3 3.2-3 14.8 0 18",
  briefcase:"M4 8h16v11H4z M9 8V6a2 2 0 012-2h2a2 2 0 012 2v2 M4 13h16",
  shield:"M12 3l7 3v6c0 4-3 7-7 9-4-2-7-5-7-9V6l7-3z",
  heart:"M12 20s-7-4.4-7-10a3.8 3.8 0 017-2 3.8 3.8 0 017 2c0 5.6-7 10-7 10z"
};
function Glyph({cat}){
  const d = PATHS[GLYPH_MAP[cat]||"shield"];
  return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
    strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
    {d.split(" M").map((seg,i)=><path key={i} d={(i?"M":"")+seg}/>)}
  </svg>);
}

function match(e, cat, q){
  if(cat!=="All" && e.cat!==cat) return false;
  if(q){
    const s=(e.event+" "+e.impact+" "+e.cat+" "+e.outlet).toLowerCase();
    if(!s.includes(q.toLowerCase())) return false;
  }
  return true;
}

function Card({e}){
  return (<article className="card">
    <div className="plate">
      <span className="glyph"><Glyph cat={e.cat}/></span>
      <span className="pcat">{e.cat}</span>
      <span className="pmeta">File No. {String(e.n).padStart(3,"0")}<br/>{e.date}</span>
    </div>
    {e.image ? <img src={e.image} alt=""/> : null}
    <div className="cbody">
      <h3 className="headline">{e.event}</h3>
      <p className="summary">{e.impact}</p>
      <div className="source">
        <span className="lbl">SOURCE</span>
        <span className="out">{e.outlet}</span>
        {e.url
          ? <a href={e.url} target="_blank" rel="noopener noreferrer">{e.srcdesc} \u2197</a>
          : <span className="nolink">{e.srcdesc} — search headline to source</span>}
        <span>· {e.srcdate}</span>
      </div>
    </div>
  </article>);
}

function App(){
  const [idx,setIdx]=React.useState(0);
  const [cat,setCat]=React.useState("All");
  const [q,setQ]=React.useState("");
  const [view,setView]=React.useState("record");   // "record" | "about"
  const [showSupport,setShowSupport]=React.useState(false);
  const readerRef=React.useRef(null);

  // close the support modal on Escape
  React.useEffect(()=>{
    if(!showSupport) return;
    const onKey=e=>{ if(e.key==="Escape") setShowSupport(false); };
    window.addEventListener("keydown",onKey);
    return ()=>window.removeEventListener("keydown",onKey);
  },[showSupport]);

  const hasPay = PAYPAL_URL || VENMO_URL;
  function goRecord(){ setView("record"); }
  function goAbout(){ setView("about"); window.scrollTo({top:0,behavior:"smooth"}); }

  const counts=DATA.map(w=>w.entries.filter(e=>match(e,cat,q)).length);
  const active=DATA[idx];
  const shown=active.entries.filter(e=>match(e,cat,q));
  const latest=DATA[0];
  const catCount=new Set(latest.entries.map(e=>e.cat)).size;

  // Dynamic totals — these update automatically when DATA grows
  const totalEntries=DATA.reduce((sum,w)=>sum+w.entries.length,0);
  const totalWeeks=DATA.length;
  const highestFileNo=Math.max(...DATA.flatMap(w=>w.entries.map(e=>e.n)));

  function pick(i){
    setIdx(i);
    if(window.innerWidth<=900 && readerRef.current){
      readerRef.current.scrollIntoView({behavior:"smooth",block:"start"});
    }
  }

  return (<React.Fragment>
    <header className="top"><div className="wrap">
      <div className="mark" onClick={goRecord} role="button" tabIndex={0}
        onKeyDown={e=>{if(e.key==="Enter"||e.key===" ")goRecord();}}>
        RIGHTS<span className="stamp">LEFT</span><span className="cursor"></span></div>
      <nav className="nav-links">
        <button className={view==="record"?"active":""} onClick={goRecord}>The Record</button>
        <button className={view==="about"?"active":""} onClick={goAbout}>About</button>
      </nav>
      <div className="controls">
        {view==="record" && <React.Fragment>
          <select value={cat} onChange={e=>setCat(e.target.value)} aria-label="Filter by category">
            <option value="All">All categories</option>
            {CATS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <input type="search" placeholder="Search…" value={q}
            onChange={e=>setQ(e.target.value)} aria-label="Search entries"/>
        </React.Fragment>}
        <button className="support-btn" onClick={()=>setShowSupport(true)}>♥ Support</button>
      </div>
    </div></header>

    {view==="record" && <React.Fragment>
    <section className="hero"><div className="wrap">
      <div className="eyebrow">Latest dispatch · File No. {String(highestFileNo).padStart(3,"0")} · Week of {latest.week}</div>
      <h1 className="htitle">THE <span className="rights">RIGHTS</span><br/>WE HAVE <span className="left">LEFT</span></h1>
      <p className="hsub">The Project to Keep a Ledger of What's Been Done and What's Been Lost</p>
      <p className="hstand">This week: {latest.entries.length} logged {latest.entries.length===1?"action":"actions"} across {catCount} {catCount===1?"category":"categories"}. Browse every prior week in the archive below.</p>
      <div className="hmeta">
        <div className="stat"><b>{totalEntries}</b><span>Entries logged</span></div>
        <div className="stat"><b>{totalWeeks}</b><span>Weeks on record</span></div>
      </div>
      <div className="infile">
        <h4>In this week's file</h4>
        <ul>
          {latest.entries.slice(0,5).map(e=>(
            <li key={e.n}>
              <span className="fn">{String(e.n).padStart(3,"0")}</span>
              <button onClick={()=>{setCat("All");setQ("");pick(0);}}>{e.event}</button>
            </li>))}
        </ul>
      </div>
    </div></section>

    <section className="record"><div className="wrap">
      <div className="rhead">
        <span>The record — {SITE.range}</span>
        <span>{cat==="All"&&!q ? totalEntries+" entries" : counts.reduce((a,b)=>a+b,0)+" matching entries"}</span>
      </div>
      <div className="grid">
        <nav className="archive" aria-label="Weekly archive">
          <div className="archive-h">Archive · {totalWeeks} weeks</div>
          {DATA.map((w,i)=>(
            <button key={w.week}
              className={"wk"+(i===idx?" active":"")+(counts[i]===0?" dim":"")}
              onClick={()=>pick(i)}>
              <span className="d">{w.week}</span>
              <span className="c">{counts[i]}</span>
            </button>))}
        </nav>
        <div ref={readerRef}>
          <h2 className="wtitle">Week of {active.week}
            <small>{shown.length} {shown.length===1?"entry":"entries"}{cat!=="All"?" · "+cat:""}{q?' · "'+q+'"':""}</small>
          </h2>
          {shown.length
            ? <div className="cards">{shown.map(e=><Card key={e.n} e={e}/>)}</div>
            : <div className="empty">No entries match this filter for this week.<br/>Try another week or clear the filter.</div>}
        </div>
      </div>
    </div></section>
    </React.Fragment>}

    {view==="about" && <section className="about">
      <div className="about-hero" style={ABOUT_IMAGE?{backgroundImage:'url("'+ABOUT_IMAGE+'")'}:{}}>
        <div className="about-hero-overlay"></div>
        {!ABOUT_IMAGE && <div className="about-placeholder">
          <span>[ Image slot — add your hosted image URL ]</span>
        </div>}
        <div className="about-hero-inner">
          <div className="eyebrow">The Rights That Have Left of Us Project</div>
          <h1 className="about-title">About the <span className="rights">Rights</span> <span className="left">Left</span> Project</h1>
        </div>
      </div>
      <div className="about-body">
        {/* ==== EXAMPLE TEXT — replace everything below with your own story ==== */}
        <p className="lead">Rights Left is an independent, source-linked record of actions taken by the Trump administration and their documented effects on rights, institutions, the rule of law, and crimes against humanity.</p>
        <h2>How it started</h2>
        <p>This project began as a single spreadsheet, just a way to keep track of what was happening week by week without losing the thread. As Trump took office the 2nd time things happened as such a rapid clip I noticed news stories were being lost just in the sheer flood of action. What started as personal note-keeping grew into something worth sharing.</p>
        <p> At time of writing I am a 38 year old man who feels our Nations cause is being lost. As the kids say now, we have lost the plot. I have no grand hopes that this will lead people to stand up but at least I want to keep track of every that has been touched, tainted, destroyed and lost. The America that I knew growing up is going to look so vastly different when this is over, that I want people to remember what it was and what it held.</p>
        <h2>What we track</h2>
        <p> Every entry is tied to reporting from established outlets or to court and government records. The goal isn't commentary for its own sake it's a durable, checkable timeline that anyone can verify for themselves.</p>
        <div className="about-note">
          This is a critical record by design; the administration and its supporters dispute many of these characterizations. Every entry links to its source.
        </div>
      </div>
    </section>}

    <footer><div className="wrap">
      <div className="disc">
        <b>About this record.</b> Rights Left compiles actions of the second Trump administration that news organizations, courts, and government data have reported as harmful to rights, institutions, or the economy. It is a critical record by design; the administration and its supporters dispute many of these characterizations. Entries are drawn from outlets including CNN, Politico, NBC, NPR, the AP, Reuters, the Guardian, CBS, ABC and court filings — <b>verify each item against its linked source before relying on it.</b>
      </div>
      <div className="fmeta">
        <span>Rights Left</span><span>{totalEntries} entries · {totalWeeks} weeks</span>
        <span>{SITE.range}</span><span>Sources linked per entry</span>
      </div>
    </div></footer>

    {showSupport && <div className="modal-backdrop" onClick={()=>setShowSupport(false)}>
      <div className="modal" role="dialog" aria-modal="true" aria-label="Support the project"
        onClick={e=>e.stopPropagation()}>
        <button className="modal-close" aria-label="Close" onClick={()=>setShowSupport(false)}>×</button>
        <div className="eyebrow">Support the project</div>
        <h3>Help keep the record going</h3>
        <p>Rights Left is independent and takes real time to research, verify, and maintain. If it's useful to you, a contribution of any size helps keep it going. Thank you.</p>
        <div className="pay-options">
          {PAYPAL_URL && <a className="pay-btn paypal" href={PAYPAL_URL}
            target="_blank" rel="noopener noreferrer">Donate with PayPal</a>}
          {VENMO_URL && <a className="pay-btn venmo" href={VENMO_URL}
            target="_blank" rel="noopener noreferrer">Send with Venmo</a>}
          {!hasPay && <div className="pay-note">Payment links coming soon — add your PayPal or Venmo link in the settings at the top of the file.</div>}
        </div>
        <p className="pay-fine">Contributions are personal gifts of support, not tax-deductible donations, and are not affiliated with any campaign or organization.</p>
      </div>
    </div>}
  </React.Fragment>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
